name: package-desktop-bundles

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS x64 bundle
            runner: macos-13
            platform_id: macos-x64
            release_os: macos
            release_arch: x64
            release_filename_suffix: .dmg
            bundle_targets: dmg
            build_args: --bundles dmg
            expected_suffixes: .dmg
            rust_target: ""
          - label: macOS arm64 bundle
            runner: macos-14
            platform_id: macos-arm64
            release_os: macos
            release_arch: arm64
            release_filename_suffix: .dmg
            bundle_targets: dmg
            build_args: --bundles dmg
            expected_suffixes: .dmg
            rust_target: ""
          - label: Windows x64 bundle
            runner: windows-latest
            platform_id: windows-x64
            release_os: windows
            release_arch: x64
            release_filename_suffix: -setup.exe
            bundle_targets: nsis
            build_args: --bundles nsis
            expected_suffixes: .exe
            rust_target: ""
          - label: Windows arm64 bundle
            runner: windows-latest
            platform_id: windows-arm64
            release_os: windows
            release_arch: arm64
            release_filename_suffix: -setup.exe
            bundle_targets: nsis
            build_args: --bundles nsis --target aarch64-pc-windows-msvc
            expected_suffixes: .exe
            rust_target: aarch64-pc-windows-msvc
          - label: Linux x64 bundle
            runner: ubuntu-22.04
            platform_id: linux-x64
            release_os: linux
            release_arch: amd64
            release_filename_suffix: .AppImage
            bundle_targets: appimage
            build_args: --bundles appimage
            expected_suffixes: .AppImage
            rust_target: ""

    env:
      NODE_VERSION: "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          root = Path('.')
          package_version = json.loads((root / 'package.json').read_text())['version']
          tauri_version = json.loads((root / 'src-tauri/tauri.conf.json').read_text())['version']
          cargo_text = (root / 'src-tauri' / 'Cargo.toml').read_text()
          cargo_match = re.search(r'(?m)^version = "([^"]+)"', cargo_text)

          if cargo_match is None:
              raise SystemExit('Could not determine Cargo version from src-tauri/Cargo.toml')

          cargo_version = cargo_match.group(1)
          versions = {package_version, tauri_version, cargo_version}
          if len(versions) != 1:
              raise SystemExit(
                  f'Version mismatch detected: package.json={package_version}, '
                  f'tauri.conf.json={tauri_version}, Cargo.toml={cargo_version}'
              )

          release_version = tauri_version
          ref_type = os.environ.get('GITHUB_REF_TYPE', '')
          ref_name = os.environ.get('GITHUB_REF_NAME', '')
          is_tag_release = ref_type == 'tag' and ref_name.startswith('v')

          if is_tag_release:
              tag_version = ref_name[1:]
              if tag_version != release_version:
                  raise SystemExit(
                      f'Release tag {ref_name} does not match checked-in app version {release_version}'
                  )
              release_tag = ref_name
          else:
              release_tag = f'v{release_version}'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'version={release_version}\n')
              output.write(f'release_tag={release_tag}\n')
              output.write(f'is_tag_release={str(is_tag_release).lower()}\n')
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libcurl4-openssl-dev libssl-dev libsasl2-dev libzstd-dev zlib1g-dev liblz4-dev libcjson-dev pkgconf libxdo-dev patchelf

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build desktop bundles
        run: npm run tauri:build -- ${{ matrix.build_args }}

      - name: Collect native release assets
        id: release_files
        shell: bash
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          EXPECTED_SUFFIXES: ${{ matrix.expected_suffixes }}
          RELEASE_OS: ${{ matrix.release_os }}
          RELEASE_ARCH: ${{ matrix.release_arch }}
          RELEASE_FILENAME_SUFFIX: ${{ matrix.release_filename_suffix }}
        run: |
          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path

          root = Path('src-tauri/target/release/bundle')
          platform_id = os.environ['PLATFORM_ID']
          release_version = os.environ['RELEASE_VERSION']
          suffixes = [suffix.strip() for suffix in os.environ['EXPECTED_SUFFIXES'].split(',') if suffix.strip()]
          release_os = os.environ['RELEASE_OS']
          release_arch = os.environ['RELEASE_ARCH']
          release_filename_suffix = os.environ['RELEASE_FILENAME_SUFFIX']
          release_files = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              if any(str(path).endswith(suffix) for suffix in suffixes):
                  if release_version not in path.name:
                      raise SystemExit(
                          f'Expected version {release_version} in release asset name, got {path.name}'
                      )
                  renamed_path = path.with_name(f'KafkaDesk-{release_version}-{release_os}-{release_arch}{release_filename_suffix}')
                  if renamed_path != path:
                      shutil.copy2(path, renamed_path)
                  release_files.append(renamed_path.as_posix())

          if not release_files:
              visible = '\n'.join(sorted(p.as_posix() for p in root.rglob('*') if p.is_file()))
              raise SystemExit(
                  f'No native release files found for {platform_id}. Visible files:\n{visible}'
              )

          print('Collected release files:')
          for file_path in release_files:
              print(file_path)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write('files<<EOF\n')
              output.write('\n'.join(release_files))
              output.write('\nEOF\n')
          PY

      - name: Archive bundle output (Unix)
        if: runner.os != 'Windows'
        id: archive_unix
        shell: bash
        run: |
          archive_path="$RUNNER_TEMP/kafkadesk-${{ steps.release_meta.outputs.version }}-${{ matrix.platform_id }}.tar.gz"
          tar -C src-tauri/target/release -czf "$archive_path" bundle
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Archive bundle output (Windows)
        if: runner.os == 'Windows'
        id: archive_windows
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:RUNNER_TEMP "kafkadesk-${{ steps.release_meta.outputs.version }}-${{ matrix.platform_id }}.zip"
          Compress-Archive -Path "src-tauri/target/release/bundle" -DestinationPath $archivePath -Force
          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kafkadesk-${{ steps.release_meta.outputs.version }}-${{ matrix.platform_id }}
          path: ${{ steps.archive_unix.outputs.archive_path || steps.archive_windows.outputs.archive_path }}
          if-no-files-found: error

      - name: Publish native release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: KafkaDesk ${{ steps.release_meta.outputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.release_meta.outputs.release_tag, '-') }}
          files: ${{ steps.release_files.outputs.files }}
          fail_on_unmatched_files: true
          overwrite_files: true
