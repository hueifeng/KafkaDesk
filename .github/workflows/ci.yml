name: baseline-checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Ensure Rollup native package is present
        shell: bash
        run: |
          rollup_pkg="$(node -p "const map = { 'darwin-arm64': '@rollup/rollup-darwin-arm64', 'darwin-x64': '@rollup/rollup-darwin-x64', 'linux-x64': '@rollup/rollup-linux-x64-gnu', 'win32-x64': '@rollup/rollup-win32-x64-msvc' }; const key = `${process.platform}-${process.arch}`; if (!map[key]) { throw new Error(`Unsupported platform for Rollup native package install: ${key}`); } map[key];")"
          npm install --no-save "$rollup_pkg"

      - name: Run baseline verification
        run: npm run check

      - name: Run frontend coverage reporting
        run: npm run test:frontend:coverage
